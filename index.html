<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸 Bucket Besties 🌸</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffd6ec, #e6d4ff, #fff1f8);
      color: #4d2945;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, white 1px, transparent 1px),
        radial-gradient(circle, #fff7bd 1px, transparent 1px);
      background-size: 60px 60px, 100px 100px;
      opacity: 0.75;
    }

    .container {
      max-width: 950px;
      margin: auto;
      padding: 28px 16px;
      position: relative;
      z-index: 2;
    }

    .card {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 15px 40px rgba(139, 74, 122, 0.18);
      margin-bottom: 18px;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 18px;
      margin: 8px 0;
      font-size: 1rem;
      background: rgba(255,255,255,0.9);
      color: #4d2945;
      outline: none;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 17px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff7ac8, #b978ff);
      color: white;
      font-weight: bold;
      font-size: 0.95rem;
      box-shadow: 0 8px 20px rgba(180, 80, 170, 0.25);
      margin: 4px;
    }

    button:hover {
      transform: scale(1.03);
    }

    .center {
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tab {
      background: rgba(255,255,255,0.7);
      color: #8a3d78;
      box-shadow: none;
    }

    .tab.active {
      background: linear-gradient(135deg, #ff7ac8, #b978ff);
      color: white;
    }

    .logout {
      background: rgba(255,255,255,0.7);
      color: #8a3d78;
      box-shadow: none;
    }

    .idea-title {
      font-size: 1.35rem;
      font-weight: bold;
    }

    .meta {
      opacity: 0.8;
      font-size: 0.95rem;
    }

    .hearts {
      display: flex;
      gap: 6px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .heart {
      background: rgba(255,255,255,0.85);
      color: #ff4fae;
      box-shadow: none;
    }

    .vote-line, .chat-line {
      background: rgba(255,255,255,0.55);
      padding: 9px 12px;
      border-radius: 14px;
      margin: 6px 0;
    }

    .done-button {
      background: linear-gradient(135deg, #7bdcb5, #8e8cff);
    }

    .small {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .chat-box {
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="container">

    <div id="loginPage" class="card">
      <h1>🌸 Bucket Besties 🌸</h1>
      <p class="center">Willkommen cutie 💖 Gib deinen Namen ein, um beizutreten.</p>
      <input id="nameInput" placeholder="Dein Name..." />
      <div class="center">
        <button onclick="saveName()">Beitreten 🌸</button>
      </div>
    </div>

    <div id="appPage" class="hidden">
      <div class="center">
        <button class="logout" onclick="changeName()">Namen ändern</button>
      </div>

      <div class="card">
        <h1>🌙 Bucket Besties ✨</h1>
        <p class="center">Hallo <strong id="currentName"></strong> 💕</p>
      </div>

      <div class="tabs">
        <button class="tab active" id="tabIdeas" onclick="showTab('ideas')">💖 Ideen</button>
        <button class="tab" id="tabDone" onclick="showTab('done')">✅ Gemacht</button>
        <button class="tab" id="tabChat" onclick="showTab('chat')">💬 Chat</button>
      </div>

      <div id="ideasSection">
        <div class="card">
          <h2>Neue Idee hinzufügen ✨</h2>
          <input id="ideaTitle" placeholder="z.B. Düsseldorf, Sushi-Abend, Spa-Day..." />
          <textarea id="ideaDescription" placeholder="Optionale Beschreibung..."></textarea>
          <div class="center">
            <button onclick="addIdea()">Idee hinzufügen 💖</button>
          </div>
        </div>
        <div id="ideasList"></div>
      </div>

      <div id="doneSection" class="hidden">
        <div class="card">
          <h2>✅ Gemachte Aktivitäten</h2>
          <p class="center small">Hier bleiben eure fertigen Erinnerungen für immer ✨</p>
        </div>
        <div id="doneList"></div>
      </div>

      <div id="chatSection" class="hidden">
        <div class="card">
          <h2>💬 Besties Chat</h2>
          <div id="chatList" class="chat-box"></div>
          <textarea id="chatMessage" placeholder="Schreib eine Nachricht..."></textarea>
          <div class="center">
            <button onclick="sendMessage()">Senden 💌</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://csirahqmmhngmrsgjjou.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1UekVjxDssmS7K1gcgXbfw_2YbvMQmL";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = localStorage.getItem("bucketBestiesName");

    function hearts(number) {
      return "💖".repeat(number) + "🤍".repeat(5 - number);
    }

    function saveName() {
      const name = document.getElementById("nameInput").value.trim();

      if (!name) {
        alert("Bitte gib deinen Namen ein 💕");
        return;
      }

      localStorage.setItem("bucketBestiesName", name);
      currentUser = name;
      showApp();
    }

    function changeName() {
      localStorage.removeItem("bucketBestiesName");
      location.reload();
    }

    function showApp() {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("appPage").classList.remove("hidden");
      document.getElementById("currentName").textContent = currentUser;
      loadIdeas();
      loadChat();
    }

    function showTab(tab) {
      document.getElementById("ideasSection").classList.add("hidden");
      document.getElementById("doneSection").classList.add("hidden");
      document.getElementById("chatSection").classList.add("hidden");

      document.getElementById("tabIdeas").classList.remove("active");
      document.getElementById("tabDone").classList.remove("active");
      document.getElementById("tabChat").classList.remove("active");

      if (tab === "ideas") {
        document.getElementById("ideasSection").classList.remove("hidden");
        document.getElementById("tabIdeas").classList.add("active");
        loadIdeas();
      }

      if (tab === "done") {
        document.getElementById("doneSection").classList.remove("hidden");
        document.getElementById("tabDone").classList.add("active");
        loadIdeas();
      }

      if (tab === "chat") {
        document.getElementById("chatSection").classList.remove("hidden");
        document.getElementById("tabChat").classList.add("active");
        loadChat();
      }
    }

    async function addIdea() {
      const title = document.getElementById("ideaTitle").value.trim();
      const description = document.getElementById("ideaDescription").value.trim();

      if (!title) {
        alert("Bitte schreibe zuerst eine Idee ✨");
        return;
      }

      const { error } = await supabaseClient
        .from("ideas")
        .insert({
          title,
          description,
          created_by: currentUser,
          is_done: false
        });

      if (error) {
        alert("Fehler: " + error.message);
        return;
      }

      document.getElementById("ideaTitle").value = "";
      document.getElementById("ideaDescription").value = "";
      loadIdeas();
    }

    async function vote(ideaId, rating) {
      const { error } = await supabaseClient
        .from("votes")
        .upsert({
          idea_id: ideaId,
          voter_name: currentUser,
          rating
        }, {
          onConflict: "idea_id,voter_name"
        });

      if (error) {
        alert("Fehler beim Bewerten: " + error.message);
        return;
      }

      loadIdeas();
    }

    async function markDone(ideaId) {
      const participants = prompt("Wer war dabei? Beispiel: Yasmin, Lina, Eliott");
      if (participants === null) return;

      const memoryNote = prompt("Kleine Erinnerung oder Kommentar? ✨");
      const today = new Date().toISOString().split("T")[0];

      const { error } = await supabaseClient
        .from("ideas")
        .update({
          is_done: true,
          done_date: today,
          participants: participants,
          memory_note: memoryNote || ""
        })
        .eq("id", ideaId);

      if (error) {
        alert("Fehler: " + error.message);
        return;
      }

      loadIdeas();
      showTab("done");
    }

    async function undoDone(ideaId) {
      const { error } = await supabaseClient
        .from("ideas")
        .update({
          is_done: false,
          done_date: null,
          participants: null,
          memory_note: null
        })
        .eq("id", ideaId);

      if (error) {
        alert("Fehler: " + error.message);
        return;
      }

      loadIdeas();
      showTab("ideas");
    }

    async function loadIdeas() {
      const { data: ideas, error: ideasError } = await supabaseClient
        .from("ideas")
        .select("*")
        .order("created_at", { ascending: false });

      const { data: votes, error: votesError } = await supabaseClient
        .from("votes")
        .select("*");

      if (ideasError || votesError) {
        alert("Fehler beim Laden: " + (ideasError?.message || votesError?.message));
        return;
      }

      renderIdeas(ideas || [], votes || []);
      renderDone(ideas || [], votes || []);
    }

    function renderIdeas(ideas, votes) {
      const list = document.getElementById("ideasList");
      list.innerHTML = "";

      const openIdeas = ideas.filter(idea => !idea.is_done);

      if (openIdeas.length === 0) {
        list.innerHTML = `<div class="card center">Noch keine offene Idee ✨</div>`;
        return;
      }

      const sorted = addScores(openIdeas, votes);

      sorted.forEach(idea => {
        const averageText = idea.votes.length
          ? `${hearts(Math.round(idea.average))} ${idea.average.toFixed(1)}/5`
          : "Noch keine Bewertung";

        const votesHtml = idea.votes.length
          ? idea.votes.map(v => `
              <div class="vote-line">
                <strong>${escapeHtml(v.voter_name)}</strong> — ${hearts(v.rating)} ${v.rating}/5
              </div>
            `).join("")
          : `<p class="meta">Noch niemand hat bewertet 💭</p>`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="idea-title">${escapeHtml(idea.title)}</div>
          <div class="meta">Vorgeschlagen von ${escapeHtml(idea.created_by)}</div>
          <p><strong>${averageText}</strong></p>
          ${idea.description ? `<p>${escapeHtml(idea.description)}</p>` : ""}

          <div class="hearts">
            <button class="heart" onclick="vote('${idea.id}', 1)">💖 1</button>
            <button class="heart" onclick="vote('${idea.id}', 2)">💖 2</button>
            <button class="heart" onclick="vote('${idea.id}', 3)">💖 3</button>
            <button class="heart" onclick="vote('${idea.id}', 4)">💖 4</button>
            <button class="heart" onclick="vote('${idea.id}', 5)">💖 5</button>
          </div>

          <div>
            <strong>Bewertungen ✨</strong>
            ${votesHtml}
          </div>

          <div class="center">
            <button class="done-button" onclick="markDone('${idea.id}')">Als gemacht markieren ✅</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function renderDone(ideas, votes) {
      const list = document.getElementById("doneList");
      list.innerHTML = "";

      const doneIdeas = ideas.filter(idea => idea.is_done);

      if (doneIdeas.length === 0) {
        list.innerHTML = `<div class="card center">Noch keine gemachten Aktivitäten 💭</div>`;
        return;
      }

      const sorted = addScores(doneIdeas, votes);

      sorted.forEach(idea => {
        const averageText = idea.votes.length
          ? `${hearts(Math.round(idea.average))} ${idea.average.toFixed(1)}/5`
          : "Keine Bewertung";

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="idea-title">✅ ${escapeHtml(idea.title)}</div>
          <div class="meta">Ursprünglich vorgeschlagen von ${escapeHtml(idea.created_by)}</div>
          <p><strong>${averageText}</strong></p>
          ${idea.description ? `<p>${escapeHtml(idea.description)}</p>` : ""}
          <p><strong>Gemacht am:</strong> ${idea.done_date || "Kein Datum"}</p>
          <p><strong>Dabei waren:</strong> ${escapeHtml(idea.participants || "Nicht angegeben")}</p>
          ${idea.memory_note ? `<p><strong>Erinnerung:</strong> ${escapeHtml(idea.memory_note)}</p>` : ""}
          <div class="center">
            <button onclick="undoDone('${idea.id}')">Zurück zu Ideen ↩️</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function addScores(ideas, votes) {
      return ideas.map(idea => {
        const ideaVotes = votes.filter(v => v.idea_id === idea.id);
        const average = ideaVotes.length
          ? ideaVotes.reduce((sum, v) => sum + v.rating, 0) / ideaVotes.length
          : 0;

        return {
          ...idea,
          votes: ideaVotes,
          average
        };
      }).sort((a, b) => b.average - a.average);
    }

    async function sendMessage() {
      const message = document.getElementById("chatMessage").value.trim();

      if (!message) {
        alert("Bitte schreibe eine Nachricht 💌");
        return;
      }

      const { error } = await supabaseClient
        .from("chat_messages")
        .insert({
          sender_name: currentUser,
          message
        });

      if (error) {
        alert("Fehler beim Senden: " + error.message);
        return;
      }

      document.getElementById("chatMessage").value = "";
      loadChat();
    }

    async function loadChat() {
      const { data, error } = await supabaseClient
        .from("chat_messages")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) {
        alert("Chat Fehler: " + error.message);
        return;
      }

      const chatList = document.getElementById("chatList");
      chatList.innerHTML = "";

      if (!data || data.length === 0) {
        chatList.innerHTML = `<p class="center small">Noch keine Nachrichten ✨</p>`;
        return;
      }

      data.forEach(msg => {
        const date = new Date(msg.created_at).toLocaleString("de-DE");

        const line = document.createElement("div");
        line.className = "chat-line";
        line.innerHTML = `
          <strong>${escapeHtml(msg.sender_name)}</strong>
          <span class="small"> — ${date}</span><br>
          ${escapeHtml(msg.message)}
        `;
        chatList.appendChild(line);
      });

      chatList.scrollTop = chatList.scrollHeight;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    if (currentUser) {
      showApp();
    }
  </script>
</body>
</html>
